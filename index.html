<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nuclear Decay Revision</title>
  <link rel="stylesheet" href="searchpage.style.css">
</head>
<body>

  <div class="searchpage">

    
    <div class="cloud-rect">
      <h1 class="cloud-title">Nuclear Decay Revision</h1>

      <input
        type="text"
        placeholder="search : alpha  beta-  gamma  beta+"
        class="search-bar"
        id="searchInput"
      >

      
      <h2 class="cloud-subtitle">
        Enter the nuclear decay you would like to start revising on:
      </h2>
    </div>

    
    <div class="left-animation">
      <img src="images/chiikawa1-copy.webp" alt="cartoon character">
      <img src="images/usagi1.png" alt="usagi one">
      <img src="images/chiikawa2.webp" alt="chiikawa two">
      <img src="images/usagi2.png" alt="usagi two">
      <img src="images/chiikawa-hachiware.png" alt="chiikawa and hachiware">
      <img src="images/usagi3.png" alt="usagi three">
      <img src="images/chiikawa-usagi.png" alt="chiikawa and usagi">
      <img src="images/hachiware1.png" alt="hachiware one">
      <img src="images/kuri-manju1.png" alt="kuri manju one">
      <img src="images/chiikawa3.png" alt="chiikawa three">
    </div>

    
    <div class="top-left">
      <img src="images/study-together.png" alt="Chiikawa" class="character" id="chiikawa">
      <div class="quote sticker"><img src="images/Work With Me Sticker.gif" alt="quotes" ></div>
    </div>

  <script src="script.js"></script>
</script>
</body>
</html>
